services:
  tempo:
    # Pinned to a conservative monolithic Tempo release for a small local stack.
    # Override GATEWAY_TEMPO_IMAGE if you validate another version.
    image: ${GATEWAY_TEMPO_IMAGE}
    container_name: ${GATEWAY_TEMPO_CONTAINER_NAME}
    restart: unless-stopped
    command: ["-target=all", "-config.file=/etc/tempo/tempo.yaml"]

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_TEMPO_HTTP_PORT}:3200"

    volumes:
      - ./configs/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo


  otel-collector:
    image: ${GATEWAY_OTEL_COLLECTOR_IMAGE}
    container_name: ${GATEWAY_OTEL_COLLECTOR_CONTAINER_NAME}
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]

    depends_on:
      - tempo

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_OTEL_GRPC_PORT}:4317"
      - "${GATEWAY_HOST}:${GATEWAY_OTEL_HTTP_PORT}:4318"
      - "${GATEWAY_HOST}:${GATEWAY_OTEL_HEALTH_PORT}:13133"

    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro


  grafana:
    # Override GATEWAY_GRAFANA_IMAGE if your registry policy requires another pinned tag.
    image: ${GATEWAY_GRAFANA_IMAGE}
    container_name: ${GATEWAY_GRAFANA_CONTAINER_NAME}
    restart: unless-stopped

    depends_on:
      - tempo

    environment:
      GF_SECURITY_ADMIN_USER: ${GATEWAY_GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GATEWAY_GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: "light"

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_GRAFANA_HTTP_PORT}:3000"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro


volumes:
  tempo-data:
  grafana-data:
