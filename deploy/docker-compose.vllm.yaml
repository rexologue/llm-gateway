services:
  llm-gateway:
    build:
      context: ../gateway

    container_name: ${GATEWAY_CONTAINER_NAME}
    restart: unless-stopped
    
    env_file:
      - .env

    depends_on:
      vllm:
        condition: service_healthy
      llm-gateway-loki:
        condition: service_started
      llm-gateway-valkey:
        condition: service_started

    environment:
      GATEWAY_BACKEND_BASE_URL: ${GATEWAY_VLLM_BACKEND_BASE_URL}

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_HTTP_PORT}:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - backend


  vllm:
    image: ${GATEWAY_VLLM_IMAGE}
    container_name: ${GATEWAY_VLLM_CONTAINER_NAME}
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-lc"]
    command: ["bash /serve_vllm.sh"]
    runtime: nvidia

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/v1/models >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

    volumes:
      - ${GATEWAY_VLLM_MODEL_PATH}:/model:ro
      - ./serve_vllm.sh:/serve_vllm.sh:ro

    networks:
      - backend


  llm-gateway-valkey:
    image: ${GATEWAY_VALKEY_IMAGE}
    container_name: ${GATEWAY_VALKEY_CONTAINER_NAME}
    restart: unless-stopped
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]

    volumes:
      - ../configs/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - llm-gateway-valkey-data:/data

    networks:
      - backend


  llm-gateway-loki:
    image: ${GATEWAY_LOKI_IMAGE}
    container_name: ${GATEWAY_LOKI_CONTAINER_NAME}
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_LOKI_HTTP_PORT}:3100"

    volumes:
      - ../configs/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - llm-gateway-loki-data:/loki

    networks:
      - backend


  llm-prometheus:
    image: ${GATEWAY_PROMETHEUS_IMAGE}
    container_name: ${GATEWAY_PROMETHEUS_CONTAINER_NAME}
    restart: unless-stopped

    ports:
      - "${GATEWAY_HOST}:${GATEWAY_PROMETHEUS_HTTP_PORT}:9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

    volumes:
      - ../configs/prometheus-vllm.yml:/etc/prometheus/prometheus.yml:ro
      - llm-prometheus-data:/prometheus

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - backend


  llm-node-exporter:
    image: ${GATEWAY_NODE_EXPORTER_IMAGE}
    container_name: ${GATEWAY_NODE_EXPORTER_CONTAINER_NAME}
    restart: unless-stopped
    network_mode: host
    pid: host

    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys

    volumes:
      - /:/host:ro,rslave


  llm-dcgm-exporter:
    image: ${GATEWAY_DCGM_EXPORTER_IMAGE}
    container_name: ${GATEWAY_DCGM_EXPORTER_CONTAINER_NAME}
    restart: unless-stopped
    runtime: nvidia

    networks:
      - backend


volumes:
  llm-gateway-loki-data:
  llm-prometheus-data:
  llm-gateway-valkey-data:


networks:
  backend:
    driver: bridge
