name: llm-gateway-sglang

services:
  llm-gateway:
    build:
      context: ../gateway

    container_name: llm-gateway
    restart: unless-stopped

    depends_on:
      sglang:
        condition: service_healthy
      llm-gateway-loki:
        condition: service_started
      llm-gateway-valkey:
        condition: service_started

    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8080"
      GATEWAY_BACKEND_BASE_URL: "http://sglang:30000"
      GATEWAY_ENABLE_MAX_COMPLETION_TOKENS_OVERRIDE: "true"
      GATEWAY_FORCED_MAX_COMPLETION_TOKENS: "1024"
      GATEWAY_ENV: "local"
      GATEWAY_REQUEST_LOG_LABEL: "llm-gateway"
      GATEWAY_TIMEOUT_CONNECT_SEC: "30"
      GATEWAY_TIMEOUT_READ_SEC: "1800"
      GATEWAY_TIMEOUT_WRITE_SEC: "1800"
      GATEWAY_TIMEOUT_POOL_SEC: "30"
      GATEWAY_HTTP_MAX_CONNECTIONS: "200"
      GATEWAY_HTTP_MAX_KEEPALIVE_CONNECTIONS: "100"
      LOKI_PUSH_URL: "http://llm-gateway-loki:3100/loki/api/v1/push"
      LOKI_ENABLED: "true"
      LOKI_BATCH_SIZE: "200"
      LOKI_FLUSH_INTERVAL_SEC: "1.0"
      LOKI_QUEUE_MAX_SIZE: "10000"
      LOG_BODY_SHA256: "false"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "llm-gateway"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SAMPLE_RATIO: "1.0"
      OTEL_FASTAPI_EXCLUDED_URLS: "/gateway/metrics,/healthz,/$"
      SESSION_VALKEY_URL: "redis://llm-gateway-valkey:6379/0"
      SESSION_KEY_PREFIX: "llm-gateway:session:"
      SESSION_TTL: "21600"
      SESSION_TRACKER_MAX_CONNECTIONS: "256"

    ports:
      - "0.0.0.0:9090:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - backend


  sglang:
    image: lmsysorg/sglang:v0.5.11
    container_name: sglang
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-lc"]
    command: ["bash /serve_sglang.sh"]
    runtime: nvidia
    ipc: host
    shm_size: "32gb"

    environment:
      - CUDA_VISIBLE_DEVICES=1

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:30000/v1/models >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s

    ports:
      - "0.0.0.0:9900:30000"

    volumes:
      - /root/.models/GigaChat3.1-10B-A1.8B:/model:ro
      - ./serve_sglang.sh:/serve_sglang.sh:ro
      - sglang-crash-dumps:/tmp/sglang_crash_dump

    networks:
      - backend


  llm-gateway-valkey:
    image: valkey/valkey:9.0-alpine
    container_name: llm-gateway-valkey
    restart: unless-stopped
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]

    volumes:
      - ../configs/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - llm-gateway-valkey-data:/data

    networks:
      - backend


  llm-gateway-loki:
    image: grafana/loki:3.7.1
    container_name: llm-gateway-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]

    ports:
      - "0.0.0.0:9092:3100"

    volumes:
      - ../configs/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - llm-gateway-loki-data:/loki

    networks:
      - backend


  llm-prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    restart: unless-stopped

    ports:
      - "0.0.0.0:9091:9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

    volumes:
      - ../configs/prometheus-sglang.yml:/etc/prometheus/prometheus.yml:ro
      - llm-prometheus-data:/prometheus

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - backend


  llm-hardware-node-exporter:
    image: prom/node-exporter:latest
    container_name: llm-hardware-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host

    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys

    volumes:
      - /:/host:ro,rslave


  llm-hardware-dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: llm-hardware-dcgm-exporter
    restart: unless-stopped
    runtime: nvidia

    networks:
      - backend


volumes:
  llm-gateway-loki-data:
  llm-prometheus-data:
  llm-gateway-valkey-data:
  sglang-crash-dumps:


networks:
  backend:
    driver: bridge
