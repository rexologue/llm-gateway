global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    metrics_path: /gateway/metrics
    static_configs:
      - targets: ["llm-gateway:8080"]

  - job_name: backend-sglang
    metrics_path: /metrics
    static_configs:
      - targets: ["sglang:30000"]

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: gpu
    static_configs:
      - targets: ["llm-hardware-dcgm-exporter:9400"]
