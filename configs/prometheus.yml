global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: vllm-via-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm-gateway:8080"]

  - job_name: gateway
    metrics_path: /gateway/metrics
    static_configs:
      - targets: ["vllm-gateway:8080"]

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: gpu
    static_configs:
      - targets: ["vllm-hardware-dcgm-exporter:9400"]
