# Disable multi-tenant mode.
# This is the simplest mode for one server and one logical client: Loki will
# not require a tenant ID on incoming requests.
auth_enabled: false

server:
  # HTTP port for the Loki API.
  # Grafana and any direct Loki API clients use this endpoint.
  http_listen_port: 3100

  # Loki's own log level.
  # info is a practical default without excessive noise.
  log_level: info

common:
  # Shared root path for Loki runtime files.
  # Mounting one persistent volume at /loki keeps the local stack simple.
  path_prefix: /loki

  # A single Loki instance must use replication factor 1.
  replication_factor: 1

  ring:
    # A single-node setup can explicitly use the loopback address.
    # This is a common local/monolithic Loki pattern.
    instance_addr: 127.0.0.1

    kvstore:
      # Store the ring in process memory.
      # This is sufficient for one service on one server.
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      # TSDB is the recommended storage/index mode for current Loki versions.
      store: tsdb

      # Store objects locally on the server filesystem.
      # This is the simplest option for a single-node stack.
      object_store: filesystem

      # Current storage schema for TSDB.
      schema: v13

      index:
        # Prefix for index files.
        prefix: index_

        # Daily index period.
        # This is the standard layout for compactor-based retention.
        period: 24h

storage_config:
  filesystem:
    # Directory where Loki stores log chunks.
    # This path should live on persistent storage.
    directory: /loki/chunks

ingester:
  wal:
    # WAL reduces the risk of losing recent logs across restarts or crashes.
    enabled: true

    # WAL directory.
    # This should also live on persistent storage.
    dir: /loki/wal

limits_config:
  # Allow structured metadata.
  # This is useful for modern Grafana/Loki analysis workflows.
  allow_structured_metadata: true

  # Do not reject entries with older timestamps.
  # This is useful when logs can arrive with some delay.
  reject_old_samples: false

  # Enable volume-related features in the Grafana/Loki UI.
  volume_enabled: true

  # Keep logs for 30 days.
  # Retention is enforced only when compactor.retention_enabled is true.
  retention_period: 30d

compactor:
  # Compactor working directory.
  # Loki stores compaction and retention runtime files here.
  working_directory: /loki/compactor

  # How often compaction runs.
  # 10m is the normal default.
  compaction_interval: 10m

  # Enable retention enforcement.
  # retention_period is ignored without this flag.
  retention_enabled: true

  # Delay before physically deleting chunks after they are marked for deletion.
  # 2h is the standard default.
  retention_delete_delay: 2h

  # Storage backend for delete requests.
  # filesystem is the natural choice for this single-node filesystem setup.
  delete_request_store: filesystem

analytics:
  # Disable Loki usage/reporting telemetry.
  reporting_enabled: false
